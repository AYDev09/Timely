<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timely</title>
    <link rel="stylesheet" href="styles.css">
    <script src="index.js" defer></script>
</head>
<body>
    <h1>Timely</h1>

    <main>
        <form id="alarm-form">
            <nav>
                <a href="index.html">Set an Alarm</a>
                <a href="Timer.html">Set a Timer</a>
            </nav>
            

            <label>
                Time
                <input type="time" name="time" step="1" required id="time">
            </label>

            <label>
                Date
                <input type="date" name="date" required id="date">
            </label>

            <button type="submit" id="submit">Save Alarm</button>
        </form>
        <p id="status" aria-live="polite" class="status"></p>
    </main>
    <audio id="alarm" src="alarm.mp3"></audio>
</body>
</html>
